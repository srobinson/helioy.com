<svg xmlns="http://www.w3.org/2000/svg" width="600" height="320" viewBox="0 0 600 320">
  <style>
    text { font-family: 'JetBrains Mono', 'SF Mono', 'Consolas', monospace; }
  </style>

  <!-- Background -->
  <rect width="600" height="320" fill="#0a0a0a"/>

  <!-- Labels -->
  <text x="20" y="24" fill="#555" font-size="9" letter-spacing="3">DARK</text>
  <text x="20" y="184" fill="#555" font-size="9" letter-spacing="3">LIGHT</text>

  <!-- ════════════ DARK ROW ════════════ -->

  <!-- 48px dark -->
  <rect x="20" y="40" width="48" height="48" rx="8" fill="#0a0a0a" stroke="#222" stroke-width="1"/>
  <ellipse cx="44" cy="64" rx="16" ry="16" stroke="#c9a227" stroke-width="1.8" fill="none"/>
  <ellipse cx="44" cy="64" rx="16" ry="6.5" stroke="#c9a227" stroke-width="1.8" fill="none"/>
  <ellipse cx="44" cy="64" rx="6.5" ry="16" stroke="#c9a227" stroke-width="1.8" fill="none"/>
  <circle cx="44" cy="64" r="2.5" fill="#c9a227"/>
  <text x="28" y="104" fill="#555" font-size="9" text-anchor="middle">48</text>
  <text x="52" y="104" fill="#555" font-size="9" text-anchor="middle">px</text>

  <!-- 32px dark -->
  <rect x="100" y="48" width="32" height="32" rx="6" fill="#0a0a0a" stroke="#222" stroke-width="1"/>
  <ellipse cx="116" cy="64" rx="11" ry="11" stroke="#c9a227" stroke-width="1.5" fill="none"/>
  <ellipse cx="116" cy="64" rx="11" ry="4.5" stroke="#c9a227" stroke-width="1.5" fill="none"/>
  <ellipse cx="116" cy="64" rx="4.5" ry="11" stroke="#c9a227" stroke-width="1.5" fill="none"/>
  <circle cx="116" cy="64" r="2" fill="#c9a227"/>
  <text x="116" y="104" fill="#555" font-size="9" text-anchor="middle">32px</text>

  <!-- 16px dark -->
  <rect x="164" y="56" width="16" height="16" rx="3" fill="#0a0a0a" stroke="#222" stroke-width="0.5"/>
  <ellipse cx="172" cy="64" rx="5.5" ry="5.5" stroke="#c9a227" stroke-width="1.2" fill="none"/>
  <ellipse cx="172" cy="64" rx="5.5" ry="2" stroke="#c9a227" stroke-width="0.7" fill="none"/>
  <ellipse cx="172" cy="64" rx="2" ry="5.5" stroke="#c9a227" stroke-width="0.7" fill="none"/>
  <circle cx="172" cy="64" r="1.2" fill="#c9a227"/>
  <text x="172" y="104" fill="#555" font-size="9" text-anchor="middle">16px</text>

  <!-- ════════════ LIGHT ROW ════════════ -->

  <!-- 48px light -->
  <rect x="20" y="200" width="48" height="48" rx="8" fill="#f2f0ea" stroke="#ddd" stroke-width="1"/>
  <ellipse cx="44" cy="224" rx="16" ry="16" stroke="#6b5512" stroke-width="1.8" fill="none"/>
  <ellipse cx="44" cy="224" rx="16" ry="6.5" stroke="#6b5512" stroke-width="1.8" fill="none"/>
  <ellipse cx="44" cy="224" rx="6.5" ry="16" stroke="#6b5512" stroke-width="1.8" fill="none"/>
  <circle cx="44" cy="224" r="2.5" fill="#6b5512"/>
  <text x="44" y="268" fill="#555" font-size="9" text-anchor="middle">48px</text>

  <!-- 32px light -->
  <rect x="100" y="208" width="32" height="32" rx="6" fill="#f2f0ea" stroke="#ddd" stroke-width="1"/>
  <ellipse cx="116" cy="224" rx="11" ry="11" stroke="#6b5512" stroke-width="1.5" fill="none"/>
  <ellipse cx="116" cy="224" rx="11" ry="4.5" stroke="#6b5512" stroke-width="1.5" fill="none"/>
  <ellipse cx="116" cy="224" rx="4.5" ry="11" stroke="#6b5512" stroke-width="1.5" fill="none"/>
  <circle cx="116" cy="224" r="2" fill="#6b5512"/>
  <text x="116" y="268" fill="#555" font-size="9" text-anchor="middle">32px</text>

  <!-- 16px light -->
  <rect x="164" y="216" width="16" height="16" rx="3" fill="#f2f0ea" stroke="#ddd" stroke-width="0.5"/>
  <ellipse cx="172" cy="224" rx="5.5" ry="5.5" stroke="#6b5512" stroke-width="1.2" fill="none"/>
  <ellipse cx="172" cy="224" rx="5.5" ry="2" stroke="#6b5512" stroke-width="0.7" fill="none"/>
  <ellipse cx="172" cy="224" rx="2" ry="5.5" stroke="#6b5512" stroke-width="0.7" fill="none"/>
  <circle cx="172" cy="224" r="1.2" fill="#6b5512"/>
  <text x="172" y="268" fill="#555" font-size="9" text-anchor="middle">16px</text>

  <!-- ════════════ STANDALONE EXPORT MARKS ════════════ -->
  <text x="280" y="24" fill="#555" font-size="9" letter-spacing="3">STANDALONE MARKS</text>

  <!-- 48px dark standalone (no bg rect - just the mark) -->
  <text x="280" y="52" fill="#444" font-size="8">dark 48</text>
  <g transform="translate(280, 56)">
    <ellipse cx="24" cy="24" rx="16" ry="16" stroke="#c9a227" stroke-width="1.8" fill="none"/>
    <ellipse cx="24" cy="24" rx="16" ry="6.5" stroke="#c9a227" stroke-width="1.8" fill="none"/>
    <ellipse cx="24" cy="24" rx="6.5" ry="16" stroke="#c9a227" stroke-width="1.8" fill="none"/>
    <circle cx="24" cy="24" r="2.5" fill="#c9a227"/>
  </g>

  <!-- 32px dark standalone -->
  <text x="360" y="52" fill="#444" font-size="8">dark 32</text>
  <g transform="translate(368, 64)">
    <ellipse cx="16" cy="16" rx="11" ry="11" stroke="#c9a227" stroke-width="1.5" fill="none"/>
    <ellipse cx="16" cy="16" rx="11" ry="4.5" stroke="#c9a227" stroke-width="1.5" fill="none"/>
    <ellipse cx="16" cy="16" rx="4.5" ry="11" stroke="#c9a227" stroke-width="1.5" fill="none"/>
    <circle cx="16" cy="16" r="2" fill="#c9a227"/>
  </g>

  <!-- 16px dark standalone -->
  <text x="440" y="52" fill="#444" font-size="8">dark 16</text>
  <g transform="translate(448, 72)">
    <ellipse cx="8" cy="8" rx="5.5" ry="5.5" stroke="#c9a227" stroke-width="1.2" fill="none"/>
    <ellipse cx="8" cy="8" rx="5.5" ry="2" stroke="#c9a227" stroke-width="0.7" fill="none"/>
    <ellipse cx="8" cy="8" rx="2" ry="5.5" stroke="#c9a227" stroke-width="0.7" fill="none"/>
    <circle cx="8" cy="8" r="1.2" fill="#c9a227"/>
  </g>

  <!-- 48px light standalone -->
  <text x="280" y="210" fill="#444" font-size="8">light 48</text>
  <g transform="translate(280, 216)">
    <ellipse cx="24" cy="24" rx="16" ry="16" stroke="#6b5512" stroke-width="1.8" fill="none"/>
    <ellipse cx="24" cy="24" rx="16" ry="6.5" stroke="#6b5512" stroke-width="1.8" fill="none"/>
    <ellipse cx="24" cy="24" rx="6.5" ry="16" stroke="#6b5512" stroke-width="1.8" fill="none"/>
    <circle cx="24" cy="24" r="2.5" fill="#6b5512"/>
  </g>

  <!-- 32px light standalone -->
  <text x="360" y="210" fill="#444" font-size="8">light 32</text>
  <g transform="translate(368, 224)">
    <ellipse cx="16" cy="16" rx="11" ry="11" stroke="#6b5512" stroke-width="1.5" fill="none"/>
    <ellipse cx="16" cy="16" rx="11" ry="4.5" stroke="#6b5512" stroke-width="1.5" fill="none"/>
    <ellipse cx="16" cy="16" rx="4.5" ry="11" stroke="#6b5512" stroke-width="1.5" fill="none"/>
    <circle cx="16" cy="16" r="2" fill="#6b5512"/>
  </g>

  <!-- 16px light standalone -->
  <text x="440" y="210" fill="#444" font-size="8">light 16</text>
  <g transform="translate(448, 232)">
    <ellipse cx="8" cy="8" rx="5.5" ry="5.5" stroke="#6b5512" stroke-width="1.2" fill="none"/>
    <ellipse cx="8" cy="8" rx="5.5" ry="2" stroke="#6b5512" stroke-width="0.7" fill="none"/>
    <ellipse cx="8" cy="8" rx="2" ry="5.5" stroke="#6b5512" stroke-width="0.7" fill="none"/>
    <circle cx="8" cy="8" r="1.2" fill="#6b5512"/>
  </g>

</svg>